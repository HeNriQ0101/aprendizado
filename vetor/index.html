<!DOCTYPE html>
<html lang="pt--br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetor</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .container {
            background: green;
            width: 150px;
            height: 70px;
            border-radius: 50px;
            box-shadow: black;
            position: relative;
        }
        button{
            width:70px;
            height: 70px;
            border-radius:60px;
            transition: 0.5s;
            position: absolute;
            left: 0px;
            
        }
    </style>
</head>

<body>
    <div class="container">
        <button onclick="onoff()">ON</button>
    </div>
    
    <script>
        function onoff(){
            let container = document.querySelector(".container");
            
            let btn = document.querySelector("button");
            
            if (container.style.background === "red" && btn.style.left === "80px"){
            container.style.background = "green";
            btn.style.left = "0px";
            btn.innerText = "ON" ;
            } 
            else{
                container.style.background = "red";
                btn.style.left = "80px";
                btn.innerText = "OFF";
            }
        }
    </script>
</body>

</html>
