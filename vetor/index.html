<!DOCTYPE html>
<html lang="pt--br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vetor</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 90vh;
        }

        .container {
            background: green;
            width: 150px;
            height: 70px;
            border-radius: 50px;
            box-shadow: grey;
        }
        button{
            width:70px;
            height: 70px;
            border-radius:60px;
            
        }
    </style>
</head>

<body>
    <div class="container">
        <button onclick="onoff()">ON</button>
    </div>
    
    <script>
        function onoff(){
            let container = document.querySelector(".container");
            
            if (container.style.background === "red"){
            container.style.background = "green";
            } 
            else{
                container.style.background = "red";
            }
            
        }
    </script>
</body>

</html>
