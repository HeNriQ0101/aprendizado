<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            text-align: center;
            margin: 250px;
        }

        .container {
            background: grey;
        }

        #display {
            background-Color: black;
            color: green;
        }
    </style>
</head>

<body>
    <div class="container">
        <button id="btn1">1</button>
        <button id="btn2">2</button>
        
        <button id="oprsoma">+</button>
        
        <button id="resultado">=</button>
        
        <button id="apagardisplay">C</button>
        
        <div id="display"></div>
    </div>
    <script>
     const disp = document.getElementById("display")
     
     const soma = document.getElementById("oprsoma");
     
     soma.onclick = () => {
         disp.textContent += "+";
     }
     
     
     const apagar = document.getElementById("apagardisplay");
     apagar.onclick = () => {
         disp.textContent = "";
     }
     
        const bt1 = document.querySelectorAll("button")[0];
        
        bt1.onclick = () => {
            Number(disp.textContent += "1");
        }
        
       const bt2 = document.querySelectorAll("button")[1];
       bt2.onclick = () => {
           Number(disp.textContent += "2");
       }
        
        
        const result = document.getElementById("resultado");
        result.onclick = () => {
            const expressao = disp.textContent;
            
            const partes = expressao.split("+");
            
            const n1 = Number(partes[0]);
            const n2 = Number(partes[1]);
            
            const resultfinal = n1 + n2;
            
            disp.textContent = resultfinal; 
            
        }
    </script>
</body>

</html>
