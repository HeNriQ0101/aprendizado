<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body {
            text-align: center;
            width: 200px;
            height: 200px;
            display: flex;
            width: 100vw;
            height: 100vh;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: grey;
            width: 400px;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(4, 70px);
            grid-gap: 15px;
            justify-content: center;
            align-items: center;
        }

        #display {
            background-Color: black;
            color: green;
            width: 100%;
            height: 100px;
            font-size: 40px;
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            margin-bottom: 10px;
        }

        button {
            border-radius: 50px;
            width: 70px;
            height: 70px;
        }

    </style>
</head>

<body>
    <div class="container">
        <div id="display"></div>

        <button id="apagardisplay">C</button>
        <button id="hist">HIST</button>
        <button id="apgcarac"><<<</button>
        <button id="resultado">=</button>
        
        <button id="btn7">7</button>
        <button id="btn8">8</button>
        <button id="btn9">9</button>
        <button id="opdivd">/</button>

        <button id="btn4">4</button>
        <button id="btn5">5</button>
        <button id="btn6">6</button>
        <button id="opmult">X</button>

        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button id="opsub">-</button>

        <button id="parents">()</button>
        <button id="btn0">0</button>
        <button id="decimal">,</button>

        <button id="oprsoma">+</button>

    </div>
    <script>
        //Variavel do Display (onde vamos mostrar a saída de dados!)
        const disp = document.getElementById("display");

        //botões Operadores:
        const soma = document.getElementById("oprsoma");
        soma.onclick = () => {
            disp.textContent += "+";
        }

        const subtra = document.getElementById("opsub");
        subtra.onclick = () => {
            disp.textContent += "-";
        }

        const multi = document.getElementById("opmult");
        multi.onclick = () => {
            disp.textContent += "x";
        }

        const div = document.getElementById("opdivd");
        div.onclick = () => {
            disp.textContent += "/";
        }

        //Botões Apagar, 
        // Full display:
        const apagar = document.getElementById("apagardisplay");
        apagar.onclick = () => {
            disp.textContent = "";
        }
        // Apagar Caracteres
        const limp = document.getElementById("apgcarac");
        limp.onclick = () => {
            const expressao = disp.textContent;
            const carac = expressao.split("");
            carac.pop();
            disp.textContent = carac.join("");

        }
        
        //Botões numéricos:
        const bt1 = document.getElementById("btn1");
        bt1.onclick = () => {
            disp.textContent += "1";
        }

        const bt2 = document.getElementById("btn2");
        bt2.onclick = () => {
            disp.textContent += "2";
        }

        const bt3 = document.getElementById("btn3");
        bt3.onclick = () => {
            disp.textContent += "3";
        }

        const bt4 = document.getElementById("btn4");
        bt4.onclick = () => {
            disp.textContent += "4";
        }

        const bt5 = document.getElementById("btn5");
        bt5.onclick = () => {
            disp.textContent += "5";
        }

        const bt6 = document.getElementById("btn6");
        bt6.onclick = () => {
            disp.textContent += "6";
        }

        const bt7 = document.getElementById("btn7");
        bt7.onclick = () => {
            disp.textContent += "7";
        }

        const bt8 = document.getElementById("btn8");
        bt8.onclick = () => {
            disp.textContent += "8";
        }

        const bt9 = document.getElementById("btn9");
        bt9.onclick = () => {
            disp.textContent += "9";
        }

        const bt0 = document.getElementById("btn0");
        bt0.onclick = () => {
            disp.textContent += "0";
        }

        //Principal, mostra o resultado!
        const result = document.getElementById("resultado");
        result.onclick = () => {
            const expressao = disp.textContent;

            const partes = expressao.split(/[+\-x\/]/);
            const operadores = expressao.match(/[+\-x\/]/g);

            const sequencia = [];
            for (let i = 0; i < partes.length; i++){
                sequencia.push(partes[i]);
                if (operadores[i]){
                    sequencia.push(operadores[i]);
                }
            }

            let resultado = parseFloat(sequencia[0]);
            for (let i = 1; i < sequencia.length; i += 2){
                const operador = sequencia[i];
                const numeros = parseFloat(sequencia[i + 1]);

                if (operador === "+") resultado += numeros;
                if (operador === "-") resultado -= numeros;
                if (operador === "x") resultado *= numeros;
                if (operador === "/") resultado /= numeros;
            }

            let nums = partes.map(Number);
            let ops = [...operadores];

            let i = 0;
            while (i < ops.length) {
                if (ops[i] === "x" || ops[i] === "/"){

                    const res = ops[i] === "x"
                    ? nums[i] * nums[i + 1]
                    : nums[i] / nums[i + 1];

                    nums.splice(i, 2, res);
                    ops.splice(i, 1);
                }
                else{
                    i++;
                }
            }

            disp.textContent = resultado.toLocaleString("pt-BR");
        }
    </script>
</body>

</html>
