<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Reação</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-image: url("fundo.png");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            height: 1000px;
        }

        main {
            display: flex;
            flex-direction: column;
            text-align: center;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: white;
            font-size: 40px;
            padding: 50px;
            margin-top: 100px;
        }

        #semaforo {
            display: grid;
            grid-template-columns: repeat(4, 70px);
            background-color: black;
            width: 300px;
            height: 200px;
            border-radius: 20px;
            align-items: center;
            justify-content: center;
        }

        li {
            list-style: none;
            background-color:#2e2e2e;
            color: #2e2e2e;
            width: 45px;
            height: 45px;
            border-radius: 50px;
            margin: 3px;
            justify-self: center;
            align-self: center;
        }

        p {
            margin-top: 50px;
        }

        button {
            margin-top: 150px;
        }
    </style>
</head>

<body>
    <main>
        <h1>Teste Sua Reação</h1>

        <div id="semaforo">
            <div class="container1">
                <li id="1luz0">0</li>
                <li id="1luz1">0</li>
                <li id="1luz2">0</li>
                <li id="1luz3">0</li>
            </div>

            <div class="container2">
                <li id="2luz0">0</li>
                <li id="2luz1">0</li>
                <li id="2luz2">0</li>
                <li id="2luz3">0</li>
            </div>

            <div id="container3">
                <li class="3luz0">0</li>
                <li class="3luz1">0</li>
                <li class="3luz2">0</li>
                <li class="3luz3">0</li>
            </div>

            <div id="container4">
                <li class="4luz0">0</li>
                <li class="4luz1">0</li>
                <li class="4luz2">0</li>
                <li class="4luz3">0</li>
            </div>

            <p>0000</p>

            <button id="start">START</button>

        </div>
    </main>
</body>

</html>
